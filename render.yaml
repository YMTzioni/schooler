services:
  - type: web
    name: schooler
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: USE_PUBPROXY
        value: true
      - key: PUBPROXY_MAX_ATTEMPTS
        value: 8
      - key: PROXY_PARALLEL_BATCH
        value: 4
      - key: YOUTUBE_PROXY_URL
        sync: false
